{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Oracle | Login</title>

    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #0f172a;    /* Deep Navy */
            --secondary: #1e293b;  /* Slate */
            --accent: #10b981;     /* Emerald Green */
            --accent-hover: #059669;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background Overlay */
        .bg-gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            z-index: -1;
        }

        /* --- LOGIN CARD --- */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* Decorative top gradient line */
        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), #065f46);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon-circle {
            width: 80px; height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid var(--glass-border);
        }

        .icon-circle i {
            font-size: 32px;
            color: var(--accent);
        }

        .logo h2 {
            color: white;
            font-weight: 600;
            font-size: 1.75rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* --- INPUTS --- */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            z-index: 2;
        }

        /* Style the Django form widgets */
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            outline: none;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(15, 23, 42, 1);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        /* --- BUTTONS --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .signup-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }

        /* --- ALERTS --- */
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .alert-danger .close {
            background: none; border: none; color: #fca5a5; font-size: 1.2rem; cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="bg-gradient-overlay"></div>

    <div class="glass-container">
        <div class="logo">
            <div class="icon-circle">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Please enter your credentials to login</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            <div id="form_errors">
                {% for key, value in form.errors.items %}
                    <i class="fas fa-exclamation-circle me-2"></i> {{ value }}
                {% endfor %}
            </div>
            <button type="button" class="close" onclick="this.parentElement.style.display='none';">&times;</button>
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                {{ form.username }}
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-login">
                Login <i class="fas fa-sign-in-alt ms-2"></i>
            </button>
        </form>

        <div class="signup-link">
            Don't have an account yet? <br>
            <a href="{% url 'customer:customer_register' %}">Create an Account</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Apply styles to Django rendered inputs dynamically
        document.addEventListener("DOMContentLoaded", function() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.classList.add('form-control-custom'); // Ensure structure matches CSS
                
                // Add placeholders if missing
                if (input.name === 'username' && !input.placeholder) input.placeholder = 'Username';
                if (input.name === 'password' && !input.placeholder) input.placeholder = 'Password';
                
                // Force styling if classes fail
                input.style.backgroundColor = "rgba(15, 23, 42, 0.6)";
                input.style.border = "1px solid rgba(255, 255, 255, 0.1)";
                input.style.color = "white";
                input.style.width = "100%";
                input.style.padding = "12px 15px 12px 45px";
                input.style.borderRadius = "10px";
            });
        });
    </script>
</body>
</html>
