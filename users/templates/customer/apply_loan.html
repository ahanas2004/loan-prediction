{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Apply for Loan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #0f172a;    /* Deep Navy */
            --secondary: #1e293b;  /* Slate */
            --accent: #10b981;     /* Emerald Green */
            --accent-hover: #059669;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary);
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Background Overlay */
        .bg-gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            z-index: -1;
        }

        /* --- NAVBAR --- */
        .navbar {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            margin-bottom: 50px;
        }
        
        .navbar-brand { font-weight: 700; color: #ffffff !important; font-size: 1.5rem; }
        .navbar-brand span { color: var(--accent); }

        .btn-dashboard {
            border: 1px solid var(--glass-border);
            color: #ffffff;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
        }
        .btn-dashboard:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* --- GLASS CARD FORM --- */
        .glass-card {
            max-width: 750px;
            margin: auto;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease-out;
        }

        .glass-card h2 {
            font-size: 2rem;
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* --- FORM STYLING (Overriding Django Default Output) --- */
        form p {
            margin-bottom: 20px;
        }

        /* Label Styling */
        form label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Input Styling */
        form input, form select, form textarea {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        form input:focus, form select:focus, form textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            background-color: rgba(15, 23, 42, 0.9);
        }

        /* Help text styling if Django outputs it */
        .helptext {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Button Styling */
        button[type="submit"] {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-overlay"></div>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Finance<span>Flow</span></a>
            <div class="ms-auto">
                <a href="{% url 'customer:customer_dashboard' %}" class="btn-dashboard">
                    <i class="fas fa-arrow-left me-2"></i> Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">

            <!-- Display Django messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert 
                        {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %} 
                        text-center" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <button type="submit">
                    Submit Application <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Optional: Script to ensure inputs render nicely if Django adds extra classes
        document.addEventListener("DOMContentLoaded", function() {
            const inputs = document.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
                input.classList.add('form-control-custom');
            });
        });
    </script>

</body>
</html>
{% endblock %}
