<!DOCTYPE html>
<html>
<head>
    <title>Stored IDs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
    <h2>All Stored IDs</h2>
    <table class="table table-bordered mt-3">
        <thead>
            <tr>

                <th>Aadhar Number</th>
                <th>PAN Number</th>
            </tr>
        </thead>
        <tbody>
            {% for id in all_ids %}
            <tr>

                <td>{{ id.aadhar_number }}</td>
                <td>{{ id.pan_number }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center">No IDs found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <a href="{% url 'users:add_id' %}" class="btn btn-primary mt-3">Add New ID</a>
</body>
</html>
